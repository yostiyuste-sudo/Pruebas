{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar - CRM</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="logo">CONSTRUCTORA CRM</a>
        <div class="user-menu">
            <span class="user-name">{{ usuario_logueado.nombre_usuario }} ({{ usuario_logueado.rol.nombre_rol }})
                ▾</span>
            <div class="dropdown-content">
                <a href="/">Contactos</a>
                <a href="/logout/" style="color: var(--primary);">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="contenedor" style="padding: 20px;">
        <div class="caja" style="max-width: 600px; margin: auto;">
            <h1 style="font-size: 20px; color: var(--primary);">Editar Contacto</h1>
            {% if error %}<div class="error-message">{{ error }}</div>{% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group"><label>Doc / NIT</label><input type="text" name="documento_nit"
                        value="{{ c.documento_nit }}" required></div>
                {% if c.nombre %}
                <div class="form-grid">
                    <div class="form-group"><label>Nombres</label><input type="text" name="nombre"
                            value="{{ c.nombre }}"></div>
                    <div class="form-group"><label>Apellidos</label><input type="text" name="apellido"
                            value="{{ c.apellido }}"></div>
                </div>
                {% else %}
                <div class="form-group"><label>Razón Social</label><input type="text" name="razon_social"
                        value="{{ c.razon_social }}"></div>
                {% endif %}
                <div class="form-grid">
                    <div class="form-group"><label>Correo</label><input type="email" name="correo"
                            value="{{ c.correo }}"></div>
                    <div class="form-group"><label>Celular</label><input type="text" name="celular"
                            value="{{ c.celular }}"></div>
                </div>
                <div class="form-grid">
                    <div class="form-group"><label>Ciudad</label><input type="text" name="ciudad"
                            value="{{ c.ciudad }}"></div>
                    <div class="form-group"><label>Dirección</label><input type="text" name="direccion"
                            value="{{ c.direccion }}"></div>
                </div>
                <button type="submit" style="width: 100%;">ACTUALIZAR DATOS</button>
            </form>
            <div style="text-align: center; margin-top: 15px;"><a href="/"
                    style="color: var(--text-secondary); text-decoration: none;">&larr; Cancelar y Volver</a></div>
        </div>
    </div>
</body>

</html>
